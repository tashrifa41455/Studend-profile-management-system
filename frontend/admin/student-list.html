<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List - Admin Panel</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (same as admin dashboard) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> EduManage</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="student-list.html" class="active"><i class="fas fa-users"></i> Students</a></li>
                <li><a href="manage-teachers.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a></li>
                <li><a href="manage-classes.html"><i class="fas fa-school"></i> Classes</a></li>
                <li><a href="manage-subjects.html"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a href="#" onclick="auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h2>Student List</h2>
                    <p style="color: var(--gray-color);">Manage all students</p>
                </div>
                <div>
                    <button class="btn btn-primary" onclick="openAddStudentModal()">
                        <i class="fas fa-plus"></i> Add Student
                    </button>
                    <button class="btn btn-outline ml-1" onclick="exportStudents()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div style="background: white; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 1.5rem; box-shadow: var(--card-shadow);">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <input type="text" id="searchInput" class="form-control" 
                               placeholder="Search students..." onkeyup="searchStudents()">
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <select id="classFilter" class="form-control" onchange="filterStudents()">
                            <option value="">All Classes</option>
                            <option value="10A">Class 10A</option>
                            <option value="10B">Class 10B</option>
                            <option value="11A">Class 11A</option>
                            <option value="11B">Class 11B</option>
                            <option value="12A">Class 12A</option>
                            <option value="12B">Class 12B</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <select id="statusFilter" class="form-control" onchange="filterStudents()">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Students Table -->
            <div class="table-container">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTableBody">
                            <!-- Loading spinner -->
                            <tr>
                                <td colspan="7">
                                    <div class="spinner"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Student Modal -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Student</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group">
                    <label for="studentName">Full Name</label>
                    <input type="text" id="studentName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="studentEmail">Email</label>
                    <input type="email" id="studentEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="studentClass">Class</label>
                    <select id="studentClass" class="form-control" required>
                        <option value="">Select Class</option>
                        <option value="10A">Class 10A</option>
                        <option value="10B">Class 10B</option>
                        <option value="11A">Class 11A</option>
                        <option value="11B">Class 11B</option>
                        <option value="12A">Class 12A</option>
                        <option value="12B">Class 12B</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="studentPhone">Phone</label>
                    <input type="tel" id="studentPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="studentStatus">Status</label>
                    <select id="studentStatus" class="form-control">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> Save Student
                </button>
            </form>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        let allStudents = [];

        async function loadStudents() {
            try {
                const response = await api.get('/students');
                if (response.success) {
                    allStudents = response.data;
                    displayStudents(allStudents);
                }
            } catch (error) {
                console.error('Error loading students:', error);
                showToast('Failed to load students', 'error');
            }
        }

        function displayStudents(students) {
            const tbody = document.getElementById('studentsTableBody');
            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No students found</td></tr>';
                return;
            }

            tbody.innerHTML = students.map(student => `
                <tr>
                    <td>${student.studentId || 'N/A'}</td>
                    <td>${student.name}</td>
                    <td>${student.class || 'N/A'}</td>
                    <td>${student.email}</td>
                    <td>${student.phone || 'N/A'}</td>
                    <td>
                        <span class="badge ${student.status === 'active' ? 'badge-success' : 'badge-danger'}">
                            ${student.status || 'active'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="editStudent('${student._id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStudent('${student._id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function searchStudents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allStudents.filter(student => 
                student.name.toLowerCase().includes(searchTerm) ||
                student.email.toLowerCase().includes(searchTerm) ||
                (student.studentId && student.studentId.toLowerCase().includes(searchTerm))
            );
            displayStudents(filtered);
        }

        function filterStudents() {
            const classFilter = document.getElementById('classFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            let filtered = allStudents;
            
            if (classFilter) {
                filtered = filtered.filter(s => s.class === classFilter);
            }
            if (statusFilter) {
                filtered = filtered.filter(s => s.status === statusFilter);
            }
            
            displayStudents(filtered);
        }

        function openAddStudentModal() {
            document.getElementById('modalTitle').textContent = 'Add New Student';
            document.getElementById('studentForm').reset();
            document.getElementById('studentId').value = '';
            document.getElementById('studentModal').classList.add('show');
        }

        function editStudent(id) {
            const student = allStudents.find(s => s._id === id);
            if (!student) return;

            document.getElementById('modalTitle').textContent = 'Edit Student';
            document.getElementById('studentId').value = student._id;
            document.getElementById('studentName').value = student.name;
            document.getElementById('studentEmail').value = student.email;
            document.getElementById('studentClass').value = student.class || '';
            document.getElementById('studentPhone').value = student.phone || '';
            document.getElementById('studentStatus').value = student.status || 'active';
            document.getElementById('studentModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('studentModal').classList.remove('show');
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;

            try {
                const response = await api.delete(`/students/${id}`);
                if (response.success) {
                    showToast('Student deleted successfully', 'success');
                    loadStudents();
                } else {
                    showToast(response.message || 'Failed to delete student', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('An error occurred', 'error');
            }
        }

        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                class: document.getElementById('studentClass').value,
                phone: document.getElementById('studentPhone').value,
                status: document.getElementById('studentStatus').value
            };

            const studentId = document.getElementById('studentId').value;

            try {
                let response;
                if (studentId) {
                    response = await api.put(`/students/${studentId}`, formData);
                } else {
                    response = await api.post('/students/register', formData);
                }

                if (response.success) {
                    showToast(studentId ? 'Student updated successfully' : 'Student added successfully', 'success');
                    closeModal();
                    loadStudents();
                } else {
                    showToast(response.message || 'Operation failed', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('An error occurred', 'error');
            }
        });

        function exportStudents() {
            // Implementation for exporting to CSV/Excel
            showToast('Export feature coming soon!', 'success');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('studentModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Load students on page load
        loadStudents();
    </script>
</body>
</html>
