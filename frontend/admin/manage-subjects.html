<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects - Admin Panel</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> EduManage</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="student-list.html"><i class="fas fa-users"></i> Students</a></li>
                <li><a href="manage-teachers.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a></li>
                <li><a href="manage-classes.html"><i class="fas fa-school"></i> Classes</a></li>
                <li><a href="manage-subjects.html" class="active"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a href="../reports/monthly-report.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                <li><a href="#" onclick="auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h2>Manage Subjects</h2>
                    <p style="color: var(--gray-color);">Create and manage subjects</p>
                </div>
                <button class="btn btn-primary" onclick="openSubjectModal()">
                    <i class="fas fa-plus"></i> Add Subject
                </button>
            </div>

            <div class="table-container">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Code</th>
                                <th>Class</th>
                                <th>Teacher</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="subjectsTableBody">
                            <tr><td colspan="5"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="subjectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="subjectModalTitle">Add New Subject</h3>
                <button class="close-btn" onclick="closeSubjectModal()">&times;</button>
            </div>
            <form id="subjectForm">
                <input type="hidden" id="subjectId">
                <div class="form-group">
                    <label for="subjectName">Subject Name</label>
                    <input type="text" id="subjectName" class="form-control" required placeholder="Example: Mathematics" />
                </div>
                <div class="form-group">
                    <label for="subjectCode">Subject Code</label>
                    <input type="text" id="subjectCode" class="form-control" required placeholder="Example: MATH101" />
                </div>
                <div class="form-group">
                    <label for="subjectClass">Class</label>
                    <select id="subjectClass" class="form-control" required>
                        <option value="">Select Class</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> Save Subject
                </button>
            </form>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        let subjects = [];
        let classes = [];

        async function loadSubjects() {
            try {
                const [subjectsRes, classesRes] = await Promise.all([
                    api.get('/subjects'),
                    api.get('/classes')
                ]);

                if (subjectsRes.success) {
                    subjects = subjectsRes.data;
                    renderSubjects(subjects);
                }
                if (classesRes.success) {
                    classes = classesRes.data;
                    renderClassOptions(classes);
                }
            } catch (error) {
                console.error('Cannot load subjects or classes', error);
                showToast('Unable to load subjects', 'error');
            }
        }

        function renderClassOptions(data) {
            const select = document.getElementById('subjectClass');
            select.innerHTML = '<option value="">Select Class</option>' + data.map(cls => `
                <option value="${cls._id}">${cls.name}${cls.section ? ' ' + cls.section : ''}</option>
            `).join('');
        }

        function renderSubjects(data) {
            const tbody = document.getElementById('subjectsTableBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No subjects found.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(subject => `
                <tr>
                    <td>${subject.name}</td>
                    <td>${subject.code}</td>
                    <td>${subject.class?.name || 'N/A'}</td>
                    <td>${subject.teacher?.name || 'Unassigned'}</td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="editSubject('${subject._id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteSubject('${subject._id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function openSubjectModal() {
            document.getElementById('subjectModalTitle').textContent = 'Add New Subject';
            document.getElementById('subjectForm').reset();
            document.getElementById('subjectId').value = '';
            document.getElementById('subjectModal').classList.add('show');
        }

        function closeSubjectModal() {
            document.getElementById('subjectModal').classList.remove('show');
        }

        async function editSubject(id) {
            const subject = subjects.find(item => item._id === id);
            if (!subject) return;

            document.getElementById('subjectModalTitle').textContent = 'Edit Subject';
            document.getElementById('subjectId').value = subject._id;
            document.getElementById('subjectName').value = subject.name || '';
            document.getElementById('subjectCode').value = subject.code || '';
            document.getElementById('subjectClass').value = subject.class?._id || '';
            document.getElementById('subjectModal').classList.add('show');
        }

        document.getElementById('subjectForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const subjectId = document.getElementById('subjectId').value;
            const payload = {
                name: document.getElementById('subjectName').value,
                code: document.getElementById('subjectCode').value,
                classId: document.getElementById('subjectClass').value
            };

            try {
                let response;
                if (subjectId) {
                    response = await api.put(`/subjects/${subjectId}`, payload);
                } else {
                    response = await api.post('/subjects', payload);
                }

                if (response.success) {
                    showToast('Subject saved successfully', 'success');
                    closeSubjectModal();
                    loadSubjects();
                } else {
                    showToast(response.message || 'Unable to save subject', 'error');
                }
            } catch (error) {
                console.error('Subject save error', error);
                showToast('An error occurred while saving subject', 'error');
            }
        });

        async function deleteSubject(id) {
            if (!confirm('Delete this subject?')) return;
            try {
                const response = await api.delete(`/subjects/${id}`);
                if (response.success) {
                    showToast('Subject deleted successfully', 'success');
                    loadSubjects();
                } else {
                    showToast(response.message || 'Unable to delete subject', 'error');
                }
            } catch (error) {
                console.error('Delete error', error);
                showToast('An error occurred while deleting subject', 'error');
            }
        }

        loadSubjects();
    </script>
</body>
</html>
